<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO BUZZ – Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0f1e; color: white; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: #111827; border-right: 1px solid #1f2937; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 1rem; }
        .btn-green { background: #16a34a; transition: all 0.2s; }
        .btn-green:hover { background: #15803d; transform: translateY(-2px); }
        .btn-red { background: #991b1b; transition: all 0.2s; }
        .btn-red:hover { background: #7f1d1d; }
        .active-tab { background: rgba(74, 222, 128, 0.1); border-left: 4px solid #4ade80; color: #4ade80; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-once { 0% { background: #16a34a; } 100% { background: #111827; } }
        .new-buzz { animation: pulse-once 1s ease-out; }
        #adminTimer { transition: color 0.5s ease, opacity 0.5s ease; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="overflow-hidden">

    <!-- LOGIN OVERLAY -->
    <div id="adminLogin" class="fixed inset-0 bg-[#0a0f1e] z-[100] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="card p-8 w-full max-w-md text-center border-green-900/30 shadow-2xl">
            <div class="text-5xl mb-4">🌿</div>
            <h2 class="text-2xl font-black text-green-400 tracking-widest mb-6 uppercase">Admin Access</h2>
            <input type="password" id="adminPass" class="w-full p-4 rounded-lg bg-[#0a0f1e] border border-gray-700 text-white mb-4 focus:border-green-500 outline-none text-center" placeholder="Password">
            <button onclick="adminAuth()" class="w-full btn-green py-4 rounded-lg font-black tracking-widest">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <div class="sidebar w-72 p-6 flex flex-col">
            <div class="mb-10 text-center">
                <div class="text-3xl mb-1">🌿</div>
                <h1 class="text-xl font-black tracking-tighter text-green-400">ECO BUZZ <span class="text-gray-500 text-xs text-white">MASTER</span></h1>
            </div>

            <nav class="space-y-2 flex-1">
                <button id="btn-control" onclick="switchTab('control')" class="w-full text-left p-4 rounded-xl active-tab transition-all"><i class="fas fa-bolt mr-3"></i> LIVE CONTROL</button>
                <button id="btn-teams" onclick="switchTab('teams')" class="w-full text-left p-4 rounded-xl hover:bg-gray-800 transition-all text-gray-400"><i class="fas fa-users mr-3"></i> TEAM MANAGER</button>
                <button id="btn-logs" onclick="switchTab('logs')" class="w-full text-left p-4 rounded-xl hover:bg-gray-800 transition-all text-gray-400"><i class="fas fa-history mr-3"></i> BUZZ HISTORY</button>
                <button id="btn-scoreboard" onclick="switchTab('scoreboard')" class="w-full text-left p-4 rounded-xl hover:bg-gray-800 transition-all text-gray-400"><i class="fas fa-trophy mr-3"></i> STANDINGS</button>
            </nav>

            <!-- EMERGENCY TOGGLE -->
            <div class="mt-6 p-4 rounded-xl bg-red-950/20 border border-red-900/30">
                <div class="text-[10px] text-red-400 font-bold mb-2 uppercase tracking-widest">Emergency Access</div>
                <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-400">Manual Login Mode</span>
                    <button id="emergencyBtn" onclick="toggleEmergency()" class="w-12 h-6 rounded-full bg-gray-700 relative transition-colors">
                        <div id="emergencyDot" class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform"></div>
                    </button>
                </div>
            </div>

            <button onclick="endGame()" class="btn-red w-full py-4 rounded-xl font-bold mt-4 text-red-100 shadow-lg shadow-red-900/20 uppercase tracking-widest">Finalize Event</button>
        </div>

        <!-- MAIN AREA -->
        <div class="flex-1 p-8 overflow-y-auto no-scrollbar relative">
            
            <!-- LIVE CONTROL -->
            <div id="tab-control" class="space-y-6">
                <div class="flex justify-between items-end">
                    <div>
                        <div id="roundText" class="text-green-500 font-bold tracking-widest text-sm">ROUND 0</div>
                        <div id="gameStatus" class="text-6xl font-black">WAITING</div>
                    </div>
                    <div id="adminTimer" class="text-7xl font-mono font-black text-green-500 opacity-20">100s</div>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <button id="startBtn" onclick="startQuestion()" class="btn-green h-24 rounded-2xl font-black text-lg shadow-xl uppercase">Start Q</button>
                    <button id="pauseBtn" onclick="togglePause()" class="bg-amber-600 hover:bg-amber-700 h-24 rounded-2xl font-black text-lg shadow-xl uppercase disabled:opacity-30" disabled>Pause</button>
                    <button onclick="stopQuestion()" class="bg-red-600 hover:bg-red-700 h-24 rounded-2xl font-black text-lg shadow-xl uppercase">Stop</button>
                    <button onclick="resetQuestion()" class="bg-gray-700 hover:bg-gray-600 h-24 rounded-2xl font-black text-lg shadow-xl uppercase">Reset</button>
                </div>

                <div class="mt-10">
                    <h3 class="text-gray-500 font-bold uppercase tracking-widest text-xs mb-4 flex items-center">
                        <span class="w-8 h-px bg-gray-800 mr-3"></span> Active Buzz Queue (Top 10)
                    </h3>
                    <div id="buzzList" class="space-y-3">
                        <div class="text-gray-600 italic text-sm">Waiting for buzzes...</div>
                    </div>
                </div>
            </div>

            <!-- LOGS -->
            <div id="tab-logs" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black uppercase">Buzz History</h2>
                    <button onclick="clearLogs()" class="text-xs text-red-400 hover:underline">Clear Logs</button>
                </div>
                <div class="card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-800/50 text-gray-400 text-xs uppercase">
                            <tr>
                                <th class="p-4">Pos</th>
                                <th class="p-4">Team</th>
                                <th class="p-4">Time</th>
                                <th class="p-4">Round</th>
                            </tr>
                        </thead>
                        <tbody id="logTable"></tbody>
                    </table>
                </div>
            </div>

            <!-- TEAM MANAGER -->
            <div id="tab-teams" class="hidden">
                <h2 class="text-3xl font-black mb-6 uppercase">Team Manager</h2>
                <div id="teamGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <!-- STANDINGS -->
            <div id="tab-scoreboard" class="hidden">
                <h2 class="text-3xl font-black mb-6 uppercase tracking-widest text-green-400">Scoreboard</h2>
                <div class="card overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-800/50 text-gray-400 text-xs uppercase text-center">
                            <tr>
                                <th class="p-4 text-left">Rank</th>
                                <th class="p-4 text-left">Team Name</th>
                                <th class="p-4 text-right">Total Score</th>
                            </tr>
                        </thead>
                        <tbody id="scoreTable"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
