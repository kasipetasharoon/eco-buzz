<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECO BUZZ – Emergency Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; position: relative; overflow-x: hidden;
        }
        /* Warning Red Glow for Emergency Mode */
        .emergency-glow {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(153, 27, 27, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .card {
            background: #111827; border: 1px solid #1f2937;
            border-radius: 1.5rem; padding: 2.25rem;
            width: 100%; max-width: 420px; position: relative; z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 0.4rem; display: block; }
        .input-field {
            width: 100%; background: #0a0f1e; border: 1px solid #1f2937;
            border-radius: 0.75rem; color: #f1f5f9;
            padding: 0.75rem 1rem; font-size: 0.95rem;
            outline: none; margin-bottom: 1rem; transition: border-color 0.2s;
        }
        .input-field:focus { border-color: #991b1b; }
        .btn-emergency {
            width: 100%; background: #991b1b; color: white;
            font-weight: 800; font-size: 1rem; padding: 1rem;
            border-radius: 0.75rem; border: none; cursor: pointer;
            letter-spacing: 0.1em; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-emergency:hover { background: #b91c1c; transform: translateY(-2px); }
        .btn-emergency:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; transform: none; }
        
        #lockedScreen { text-align: center; }
        .status-msg { font-size: 0.8rem; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>

<div class="emergency-glow"></div>

<!-- LOCKED VIEW (Shows when Admin hasn't enabled Emergency Mode) -->
<div id="lockedScreen" class="card hidden">
    <div class="text-6xl mb-4 text-gray-700">🔒</div>
    <h1 class="text-2xl font-black text-white mb-2 uppercase">Emergency Locked</h1>
    <p class="text-gray-500 text-sm mb-6">The Admin has not enabled Emergency Manual Login. Please use the standard login page.</p>
    <a href="login.html" class="inline-block px-6 py-2 bg-gray-800 text-green-400 rounded-full font-bold text-xs uppercase tracking-widest">Standard Login</a>
</div>

<!-- LOGIN VIEW (Shows when Emergency Mode is active) -->
<div id="loginForm" class="card hidden">
    <div style="text-align:center; margin-bottom:1.5rem;">
        <div style="font-size:2rem; margin-bottom:0.4rem;">🚨</div>
        <div style="font-size:1.4rem; font-weight:900; letter-spacing:0.15em; color:#f87171;">EMERGENCY ENTRY</div>
        <div style="font-size:0.65rem; color:#6b7280; letter-spacing:0.1em; margin-top:2px;">MANUAL DATABASE REGISTRATION</div>
    </div>

    <label class="input-label">Official Team Name</label>
    <input id="uTeam" type="text" class="input-field" placeholder="e.g. Green Earth">

    <label class="input-label">Team Leader Name</label>
    <input id="uLeader" type="text" class="input-field" placeholder="Full Name">

    <label class="input-label">Member Names (Comma Separated)</label>
    <input id="uMembers" type="text" class="input-field" placeholder="e.g. John, Sarah, Mike">

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="input-label">Branch</label>
            <input id="uBranch" type="text" class="input-field" placeholder="e.g. CSE">
        </div>
        <div>
            <label class="input-label">Semester</label>
            <input id="uSem" type="text" class="input-field" placeholder="e.g. 4th">
        </div>
    </div>

    <button id="uBtn" class="btn-emergency" onclick="handleEmergencyLogin()">
        BYPASS & LOGIN <i class="fas fa-sign-in-alt"></i>
    </button>
    <div id="uStatus" class="status-msg"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="js/firebase-config.js"></script>

<script>
    // ── LISTEN FOR EMERGENCY MODE ──
    window.db.ref('gameState/emergencyMode').on('value', snap => {
        const isActive = snap.val() === true;
        document.getElementById('loginForm').classList.toggle('hidden', !isActive);
        document.getElementById('lockedScreen').classList.toggle('hidden', isActive);
    });

    // ── LOGIN HANDLER ──
    async function handleEmergencyLogin() {
        const teamName = document.getElementById('uTeam').value.trim();
        const leaderName = document.getElementById('uLeader').value.trim();
        const members = document.getElementById('uMembers').value.trim();
        const branch = document.getElementById('uBranch').value.trim();
        const sem = document.getElementById('uSem').value.trim();

        if (!teamName || !leaderName) {
            showStatus("Team Name and Leader are required!", "text-red-500");
            return;
        }

        const btn = document.getElementById('uBtn');
        btn.disabled = true;
        showStatus("Creating Emergency Session...", "text-gray-400");

        // Generate TeamID (Prefixed with EMG to track bypass users)
        const teamId = "EMG_" + teamName.toUpperCase().replace(/\s+/g, '_') + "_" + Date.now().toString().slice(-4);
        const newSessionId = "EMG_SESSION_" + Math.random().toString(36).substr(2, 9);

        // Prepare Members Array
        const memberList = members.split(',').map(name => ({ name: name.trim() })).filter(m => m.name !== "");

        const teamData = {
            name: teamName,
            leaderName: leaderName,
            branch: branch,
            semester: sem,
            members: memberList,
            score: 20, // Default starting score
            sessionId: newSessionId,
            lastActive: firebase.database.ServerValue.TIMESTAMP,
            isEmergency: true
        };

        try {
            // Write to Firebase
            await window.db.ref(`teams/${teamId}`).set(teamData);

            // Save locally
            localStorage.setItem('quiz_teamId', teamId);
            localStorage.setItem('quiz_sessionId', newSessionId);

            showStatus("Access Granted! Redirecting...", "text-green-500");
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);

        } catch (error) {
            console.error(error);
            showStatus("Database Error: " + error.message, "text-red-500");
            btn.disabled = false;
        }
    }

    function showStatus(msg, colorClass) {
        const el = document.getElementById('uStatus');
        el.innerText = msg;
        el.className = "status-msg " + colorClass;
    }
</script>
</body>
</html>
